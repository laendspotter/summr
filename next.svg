'use client'
import Link from 'next/link'
import { createClient } from '@supabase/supabase-js'
import { useState } from 'react'
import { useRouter } from 'next/navigation'

export default function Landing() {
  const [loading, setLoading] = useState<string | null>(null)
  const router = useRouter()

  function getClient() {
    return createClient(
      process.env.NEXT_PUBLIC_SUPABASE_URL!,
      process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!
    )
  }

  async function handleGoogle() {
    setLoading('google')
    try {
      const { error } = await getClient().auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: `${window.location.origin}/auth/callback` }
      })
      if (error) throw error
    } catch { setLoading(null) }
  }

  async function handleGuest() {
    setLoading('guest')
    try {
      const { error } = await getClient().auth.signInAnonymously()
      if (error) throw error
      router.push('/dashboard')
    } catch { setLoading(null) }
  }

  const features = [
    { emoji: '📍', title: 'aktivitäten in deiner nähe', desc: 'finde events im einstellbaren umkreis — spontan oder geplant.' },
    { emoji: '💬', title: 'gruppenchat inklusive', desc: 'jeder event hat einen chat der danach automatisch gelöscht wird.' },
    { emoji: '⭐', title: 'bewertungen nach dem event', desc: 'alle bewerten alle — transparenz und vertrauen in der community.' },
    { emoji: '🌞', title: 'kein sommer alleine', desc: 'sport, musik, essen, gaming — für jeden ist was dabei.' },
  ]

  return (
    <main style={{ minHeight: '100vh', background: 'var(--bg)' }}>
      {/* NAV */}
      <nav>
        <div className="nav-inner">
          <span className="logo">summr</span>
          <button className="btn-secondary" onClick={handleGoogle} style={{ fontSize: '13px', padding: '8px 16px' }}>
            anmelden
          </button>
        </div>
      </nav>

      {/* HERO */}
      <section style={{ padding: '100px 24px 120px', textAlign: 'center', position: 'relative', overflow: 'hidden' }}>
        {/* glow effects */}
        <div style={{
          position: 'absolute', top: '10%', left: '50%', transform: 'translateX(-50%)',
          width: '600px', height: '300px',
          background: 'radial-gradient(ellipse, rgba(255,107,53,0.12) 0%, transparent 70%)',
          pointerEvents: 'none',
        }} />

        <div style={{ maxWidth: '640px', margin: '0 auto', position: 'relative' }}>
          <div className="badge badge-sun fade-up" style={{ marginBottom: '28px', fontSize: '12px', padding: '5px 14px' }}>
            🌞 sommer 2025
          </div>
          <h1 className="fade-up" style={{
            fontSize: 'clamp(48px, 9vw, 88px)',
            fontWeight: 800,
            lineHeight: 0.95,
            letterSpacing: '-3px',
            marginBottom: '28px',
            animationDelay: '0.08s',
          }}>
            kein sommer<br />
            <span style={{ color: 'var(--sun)' }}>alleine.</span>
          </h1>
          <p className="fade-up" style={{
            fontSize: '17px',
            color: 'var(--text-muted)',
            lineHeight: 1.7,
            marginBottom: '44px',
            animationDelay: '0.16s',
            fontWeight: 400,
          }}>
            finde aktivitäten in deiner nähe,<br />triff neue leute und mach diesen sommer unvergesslich.
          </p>

          <div className="fade-up" style={{ display: 'flex', gap: '10px', justifyContent: 'center', flexWrap: 'wrap', animationDelay: '0.24s' }}>
            <button className="btn-primary" onClick={handleGoogle} disabled={!!loading} style={{ fontSize: '15px', padding: '13px 26px' }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="white"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="white" opacity="0.8"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="white" opacity="0.6"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="white" opacity="0.9"/>
              </svg>
              {loading === 'google' ? 'lädt...' : 'mit google starten'}
            </button>
            <button className="btn-secondary" onClick={handleGuest} disabled={!!loading} style={{ fontSize: '15px', padding: '13px 26px', opacity: 0.65 }}>
              {loading === 'guest' ? 'lädt...' : 'als gast testen'}
            </button>
          </div>
        </div>
      </section>

      {/* FEATURES */}
      <section style={{ padding: '0 24px 100px', maxWidth: '1120px', margin: '0 auto' }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(230px, 1fr))', gap: '16px' }}>
          {features.map((f, i) => (
            <div key={i} className="card fade-up" style={{ padding: '28px', animationDelay: `${0.3 + i * 0.08}s` }}>
              <div style={{ fontSize: '32px', marginBottom: '14px' }}>{f.emoji}</div>
              <h3 style={{ fontSize: '16px', fontWeight: 700, marginBottom: '8px', letterSpacing: '-0.3px' }}>{f.title}</h3>
              <p style={{ color: 'var(--text-muted)', fontSize: '13px', lineHeight: 1.6 }}>{f.desc}</p>
            </div>
          ))}
        </div>
      </section>

      {/* CTA DARK SECTION */}
      <section style={{
        borderTop: '1px solid var(--border)',
        padding: '80px 24px',
        textAlign: 'center',
        background: 'linear-gradient(180deg, var(--bg) 0%, #120F0D 100%)',
      }}>
        <h2 style={{ fontSize: '40px', fontWeight: 800, marginBottom: '14px', letterSpacing: '-1.5px' }}>
          bereit für den besten sommer?
        </h2>
        <p style={{ color: 'var(--text-muted)', marginBottom: '32px', fontSize: '15px' }}>
          kostenlos · keine app nötig · sofort loslegen
        </p>
        <button className="btn-primary" onClick={handleGoogle} style={{ fontSize: '15px', padding: '14px 28px' }}>
          jetzt starten 🌞
        </button>
      </section>

      <footer style={{ borderTop: '1px solid var(--border)', padding: '20px 24px', textAlign: 'center' }}>
        <span style={{ color: 'var(--text-muted)', fontSize: '12px' }}>summr © 2025 — kein sommer alleine</span>
      </footer>
    </main>
  )
}
